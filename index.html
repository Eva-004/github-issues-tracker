<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-primary-content py-10">
    <main class="max-w-md bg-base-100 mx-auto p-8">
        <div>
            <div class="flex justify-center items-center mb-6">
                <img src="./assets/github-logo.png" alt="logo" class="w-24 ">
            </div>
            <h2 class="text-2xl font-semibold text-center">GitHub Issues Tracker</h2>
            <p class="text-[#64748B] text-center">Sign in to manage your issues</p>
        </div>
        <div class="mt-6">
            <fieldset class="fieldset  w-full">

                <label class="font-medium text-lg ">Username</label>
                <input type="text" class="input w-full rounded-lg text-[#64748B]" placeholder="Enter Username" />

                <label class="font-medium text-lg">Password</label>
                <input type="password" class="input w-full rounded-lg text-[#64748B]" placeholder="Password" />

                <button class="btn btn-primary mt-4 font-bold rounded-lg">Sign In</button>
            </fieldset>
        </div>
       <div class="flex justify-center font-semibold mt-6">OR</div>
       <div class="mt-6 text-center">
        <div class="text-[#64748B] mb-2">Demo Credentials:</div>
        <div class="p-4 bg-base-200">
          <h2 class="font-semibold ">Username: <span class="font-normal text-[#64748B]">admin</span></h2>
          <h2 class="font-semibold">Password: <span class="font-normal text-[#64748B]">admin123</span></h2>
        </div>
       </div>
    </main>
</body>

</html>
