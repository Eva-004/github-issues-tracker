<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Github Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-[#F8FAFC] min-h-screen">
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl">
                    <img src="./assets/github-logo.png" alt="logo" class="w-9 h-9">
                    <h1 class="font-semibold text-2xl">GitHub Issues Tracker</h1>
                </a>
            </div>
            <div class="join gap-2">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search issues..." />
                </label>
                <button class="btn btn-primary text-white join-item">Search</button>
            </div>
        </div>
    </header>
    <main class="w-9/12 mx-auto py-14">
        <section id="allIssueBtns">
            <div class="navbar bg-base-100 shadow-sm gap-4">
                <button id="all-btn" class="btn btn-primary text-white">All</button>
                <button class="btn btn-outline">Open</button>
                <button class="btn btn-outline">Closed</button>
            </div>
        </section>
        <section class="mt-4">
           <div class="navbar bg-base-100 shadow-sm gap-4 flex justify-between">
                <div class="flex items-center gap-4">
                    <img src="./assets/Aperture.png" alt="" class="p-3 rounded-full bg-gray-100">
                    <div>
                        <h2 class="font-semibold text-xl text-neutral"><span>50</span> Issues</h2>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex justify-between gap-2 items-center">
                    <div class="flex gap-2 items-center font-semibold"><i class="fa-solid fa-circle text-accent"></i> Open</div>
                    <div class="flex gap-2 items-center font-semibold"><i class="fa-solid fa-circle text-purple-500"></i> Closed</div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
