<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Github Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-[#F8FAFC] min-h-screen">
    <header>
        <div class=" flex-col md:flex-row navbar bg-base-100 shadow-sm space-y-2">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl">
                    <img src="./assets/github-logo.png" alt="logo" class="w-9 h-9">
                    <h1 class="font-semibold text-2xl">GitHub Issues Tracker</h1>
                </a>
            </div>
            <div class="join gap-2">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search" type="search" required placeholder="Search issues..." />
                </label>
                <button onclick="loadSearchValue()" class="btn btn-primary text-white join-item"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </header>
    <main class="w-11/12 mx-auto py-14">
        <section id="allIssueBtns">
            <div class="navbar bg-base-100 shadow-sm gap-4">
                <button id="all-btn" class="btn btn-primary text-white open-close-all">All</button>
                <button onclick="displayOpenIssue()" id="open-btn" class="btn btn-outline open-close-all">Open</button>
                <button onclick="displayClosedIssue()" id="closed-btn" class="btn btn-outline open-close-all">Closed</button>
            </div>
        </section>
        <section class="mt-4">
            <div class="navbar bg-base-100 shadow-sm gap-4 flex justify-between">
                <div class="flex items-center gap-4">
                    <img src="./assets/Aperture.png" alt="" class="p-2 md:p-3 rounded-full bg-gray-100">
                    <div>
                        <h2 class="font-semibold text-lg md:text-xl text-neutral"><span id="allIssue">50</span> Issues</h2>
                        <p class="text-[#64748B] text-sm md:text-lg">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex flex-col md:flex-row justify-between gap-2 items-center">
                    <div class="flex gap-2 items-center font-semibold"><i class="fa-solid fa-circle text-accent"></i>
                        Open</div>
                    <div class="flex gap-2 items-center font-semibold"><i
                            class="fa-solid fa-circle text-purple-500"></i> Closed</div>
                </div>
            </div>
        </section>
        <section id="load-spinner" class="hidden justify-center item center p-4 ">
            <span class="loading loading-spinner loading-xl"></span>
        </section>
        <section id="allIssueContainer" class="grid grid-cols-1 md:grid-cols-4 gap-3 bg-white p-4">
            
        </section>

        <dialog id="modalContainer" class="modal">
  <div class="modal-box space-y-3">
    <h3 id="title" class="text-lg font-bold"></h3>
    <div class="flex items-center gap-2">
       <div id="status" class="badge badge-success text-white"></div>
       <p class="text-[#64748B] flex gap-2 items-center">.<span id="author"></span>.<span id="date"></span></p>
    </div>
    <div id="labels" class="flex gap-2 flex-wrap"></div>
    <p id="description" class="py-4 text-[#64748B]"></p>
    <div class="bg-base-200 flex justify-between rounded-lg p-2">
        <div class="w-full">
            <p class="text-[#64748B]">Assignee:</p>
            <h3 id="assignee" class="font-bold"></h3>
        </div>
        <div class="w-full">
            <p class="text-[#64748B]">Priority:</p>
            <div id="priority" class="badge badge-error text-white text-lg"></div>
        </div>
    </div>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-primary text-white">Close</button>
      </form>
    </div>
  </div>
</dialog>
    </main>
    <script src="./scripts/home.js"></script>
</body>

</html>
